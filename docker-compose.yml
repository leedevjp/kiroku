services:
  postgres:
    image: postgres:17
    container_name: kiroku-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: kiroku
      POSTGRES_USER: kiroku
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: kiroku-backend
    restart: unless-stopped

    environment:
      JWT_SECRET: local-development-secret-key-should-be-long-enough-32bytes
      JWT_ACCESS_TOKEN_EXPIRATION_MS: 3600000

    depends_on:
      - postgres

    ports:
      - "8080:8080"

volumes:
  postgres_data: